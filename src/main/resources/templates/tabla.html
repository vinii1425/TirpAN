<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>AppTrip</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <img th:src="@{/images/logo.png}" width="100">
    
    <h1 class="mt-3">Trips en El Salvador</h1>

    <table class="table table-hover mt-3">

        <thead>
            <tr>
                <th>Foto</th>
                <th>Id</th>
                <th>Nombre</th>
                <th>Fecha publicación</th>
                <th>Costo</th>
                <th>Descripción</th>
                <th>Destacado</th>
                <th>Detalle</th>
                <th>Eliminar</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="trip : ${trips}">

                
                <td>
                    <img th:src="@{/images/{img}(img=${trip.imagen})}" width="100" height="100">
                </td>

                
                <td th:text="${trip.id}"></td>
                <td th:text="${trip.nomTrip}"></td>
                <td th:text="${trip.fecha}"></td>
                <td th:text="${trip.costo}"></td>
                <td th:text="${trip.descripcion}"></td>

                
                <td>
                    <span th:if="${trip.destacado == 1}" class="badge bg-success">Si</span>
                    <span th:unless="${trip.destacado == 1}" class="badge bg-danger">No</span>
                </td>


                <td>
                    <a th:href="@{/trips/view/{id}(id=${trip.id})}" 
                       class="btn btn-success">
                       Detalle
                    </a>
                </td>

                
                <td>
                    <a th:href="@{/trips/delete(id=${trip.id})}" 
                       class="btn btn-danger">
                       Eliminar
                    </a>
                </td>

            </tr>
        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

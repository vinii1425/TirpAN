<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>AppTrip - Roles</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

 
    <img th:src="@{/images/logo.png}" width="100">
    
   
    <h1 class="mt-3">Listado de Roles</h1>

   
    <table class="table table-hover mt-3">

        <thead>
            <tr>
                <th>Id</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Detalle</th>
                <th>Eliminar</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="role : ${roles}">

                
                <td th:text="${role.id}"></td>
                <td th:text="${role.nomRol}"></td>
                <td th:text="${role.descripcion}"></td>
                <td th:text="${#dates.format(role.fecha, 'dd-MM-yyyy')}"></td>

             
                <td>
                    <span th:if="${role.activo == 'Activo'}" class="badge bg-success">Activo</span>
                    <span th:unless="${role.activo == 'Activo'}" class="badge bg-danger">Inactivo</span>
                </td>

               
                <td>
                    <a th:href="@{/roles/view/{id}(id=${role.id})}" 
                       class="btn btn-success">
                       Detalle
                    </a>
                </td>

                
                <td>
                    <a th:href="@{/roles/delete(id=${role.id})}" 
                       class="btn btn-danger"
                       onclick="return confirm('¿Seguro que deseas eliminar este rol?');">
                       Eliminar
                    </a>
                </td>

            </tr>
        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
